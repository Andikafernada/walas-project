server {
    listen 80;
    listen [::]:80;
    server_name walas.my.id api.walas.my.id;

    root /var/www/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/javascript text/javascript;

    charset utf-8;

    # Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check
    location /health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny sensitive files
    location ~ /\. {
        deny all;
    }

    # Max upload
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/walas.access.log;
    error_log /var/log/nginx/walas.error.log;
}
