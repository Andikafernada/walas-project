server {
    listen 80;
    server_name walas.my.id www.walas.my.id;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name walas.my.id www.walas.my.id;

    root /var/www/walas-pro/public;
    index index.php index.html;

    # SSL Certificate
    ssl_certificate /etc/letsencrypt/live/walas.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/walas.my.id/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml text/javascript image/svg+xml;

    # Laravel Routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/ {
        proxy_pass http://app:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        rewrite ^/n8n/(.*) /$1 break;
    }

    # PHP-FPM
    location ~ \.php$ {
        proxy_pass http://app:9000;
        proxy_set_header Host $host;
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_read_timeout 300;
    }

    # Static Assets
    location ~* \.(css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot|otf)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API subdomain
server {
    listen 443 ssl http2;
    server_name api.walas.my.id;

    root /var/www/walas-pro/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/api.walas.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.walas.my.id/privkey.pem;

    location / {
        proxy_pass http://app:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
