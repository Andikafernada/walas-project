server {
    listen 80;
    listen [::]:80;
    server_name walas.my.id;

    root /var/www/walas-pro/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/javascript text/javascript;

    charset utf-8;

    # Laravel public/index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check endpoint (public)
    location /up {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files
    location /storage {
        alias /var/www/walas-pro/storage/app/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PHP-FPM processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    # Deny access to .env
    location ~ /\.env {
        deny all;
    }

    # Deny access to storage logs
    location ~* /storage/logs {
        deny all;
    }

    # Max upload size (20MB)
    client_max_body_size 20M;

    # Access and error logs
    access_log /var/log/nginx/walas-access.log;
    error_log /var/log/nginx/walas-error.log;
}

