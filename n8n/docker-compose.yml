version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: walas-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:admin123}
      - N8N_HOST=${N8N_HOST:localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:https://your-domain.com}
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_TIMEOUT=all
      - GENERIC_TIMEZONE=Asia/Jakarta
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:n8n123}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: walas-n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:n8n}
      - POSTGRES_USER=${POSTGRES_USER:n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:n8n123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
